      description:
        example: Fokus latihan dada
        type: string
      is_rest_day:
        example: false
        type: boolean
      muscle_group_public_id:
        example: muscle-group-public-id
        type: string
      title:
        example: Chest Day
        type: string
    required:
    - day_of_week
    - title
    type: object
