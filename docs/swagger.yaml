basePath: /api
definitions:
  backend.AssignWorkoutTemplateRequest:
    properties:
      name:
        example: Jadwal Budi - Beginner 5 Days
        type: string
      workout_template_public_id:
        example: template-public-id
        type: string
    required:
    - workout_template_public_id
    type: object
  backend.CreateExpenseCategoryRequest:
    properties:
      name:
        example: Listrik
        type: string
    required:
    - name
    type: object
  backend.CreateExpenseRequest:
    properties:
      amount:
        example: 500000
        minimum: 0
        type: integer
      description:
        example: Token listrik
        type: string
      expense_category_public_id:
        example: category-public-id
        type: string
      expense_date:
        example: "2026-06-16"
        type: string
      status:
        example: approved
        type: string
      title:
        example: Bayar listrik Juni
        type: string
    required:
    - amount
    - expense_category_public_id
    - title
    type: object
  backend.CreateGymSubscriptionRequest:
    properties:
      auto_renew:
        example: false
        type: boolean
      notes:
        example: Owner subscribe paket Premium
        type: string
      payment_method:
        example: transfer
        type: string
      saas_plan_public_id:
        example: 00000000-0000-4000-8000-000000000102
        type: string
      start_date:
        example: "2026-06-16"
        type: string
      status:
        example: paid
        type: string
    required:
    - saas_plan_public_id
    type: object
  backend.CreateMemberRequest:
    properties:
      address:
        example: Probolinggo
        type: string
      birth_date:
        example: "1998-01-10"
        type: string
      email:
        example: budi@email.com
        type: string
      emergency_contact_name:
        example: Siti
        type: string
      emergency_contact_phone:
        example: "08999999999"
        type: string
      full_name:
        example: Budi Santoso
        type: string
      gender:
        example: male
        type: string
      joined_at:
        example: "2026-06-16"
        type: string
      member_code:
        example: MBR-001
        type: string
      notes:
        example: Member baru
        type: string
      phone:
        example: "08123456789"
        type: string
    required:
    - full_name
    - member_code
    type: object
  backend.CreateMembershipPackageRequest:
    properties:
      description:
        example: Membership 30 hari
        type: string
      duration_days:
        example: 30
        minimum: 1
        type: integer
      name:
        example: Bulanan
        type: string
      price:
        example: 300000
        minimum: 0
        type: integer
    required:
    - duration_days
    - name
    type: object
  backend.CreateMuscleGroupRequest:
    properties:
      code:
        example: chest
        type: string
      description:
        example: Otot dada
        type: string
      name:
        example: Chest
        type: string
    required:
    - code
    - name
    type: object
  backend.CreatePaymentRequest:
    properties:
      discount_amount:
        example: 50000
        type: integer
      member_public_id:
        example: member-public-id
        type: string
      membership_package_public_id:
        example: package-public-id
        type: string
      notes:
        example: Promo member lama
        type: string
      payment_method:
        enum:
        - cash
        - transfer
        - qris
        example: cash
        type: string
      start_date:
        example: "2026-06-16"
        type: string
      status:
        example: paid
        type: string
    required:
    - member_public_id
    - membership_package_public_id
    - payment_method
    type: object
  backend.CreateReminderRuleRequest:
    properties:
      channel:
        example: whatsapp
        type: string
      days_before_expiry:
        example: 3
        minimum: 0
        type: integer
      message_template:
        example: Halo {member_name}, membership kamu akan habis pada {end_date}.
        type: string
      name:
        example: Reminder H-3
        type: string
    required:
    - message_template
    - name
    type: object
  backend.CreateSubscriptionRequest:
    properties:
      member_public_id:
        example: member-public-id
        type: string
      membership_package_public_id:
        example: package-public-id
        type: string
      start_date:
        example: "2026-06-16"
        type: string
    required:
    - member_public_id
    - membership_package_public_id
    type: object
  backend.CreateUserRequest:
    properties:
      email:
        example: andi@gym.com
        type: string
      name:
        example: Andi Trainer
        type: string
      password:
        example: secret123
        minLength: 6
        type: string
      role:
        enum:
        - owner
        - admin
        - cashier
        - trainer
        example: trainer
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  backend.CreateWeightLogRequest:
    properties:
      measured_date:
        example: "2026-06-16"
        type: string
      notes:
        example: Ditimbang setelah latihan
        type: string
      weight_kg:
        example: 68.5
        type: number
    required:
    - measured_date
    - weight_kg
    type: object
  backend.CreateWorkoutTemplateRequest:
    properties:
      description:
        example: Jadwal latihan pemula 5 hari
        type: string
      name:
        example: Beginner 5 Days
        type: string
    required:
    - name
    type: object
  backend.FinishWorkoutSessionRequest:
    properties:
      notes:
        example: Latihan selesai, cukup berat
        type: string
      qr_token:
        example: qr-token-random
        type: string
    required:
    - qr_token
    type: object
  backend.LoginRequest:
    properties:
      email:
        example: owner@gym.com
        type: string
      gym_public_id:
        example: 00000000-0000-4000-8000-000000000001
        type: string
      password:
        example: password
        type: string
    required:
    - email
    - password
    type: object
  backend.LogoutRequest:
    properties:
      refresh_token:
        example: refresh-token
        type: string
    required:
    - refresh_token
    type: object
  backend.ManualCheckinRequest:
    properties:
      member_public_id:
        example: member-public-id
        type: string
      notes:
        example: Manual check-in karena kamera bermasalah
        type: string
    required:
    - member_public_id
    type: object
  backend.ManualWorkoutSessionRequest:
    properties:
      duration_seconds:
        example: 3600
        minimum: 1
        type: integer
      muscle_group_public_id:
        example: chest-public-id
        type: string
      notes:
        example: Input manual oleh trainer
        type: string
      title:
        example: Chest Day
        type: string
      workout_date:
        example: "2026-06-16"
        type: string
    required:
    - duration_seconds
    - title
    - workout_date
    type: object
  backend.PaymentActionRequest:
    properties:
      notes:
        example: Salah input pembayaran
        type: string
