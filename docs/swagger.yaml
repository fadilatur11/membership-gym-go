      measured_date:
        example: "2026-06-16"
        type: string
      notes:
        example: Setelah latihan
        type: string
      qr_token:
        example: qr-token-random
        type: string
      weight_kg:
        example: 68.5
        type: number
    required:
    - measured_date
    - qr_token
    - weight_kg
    type: object
