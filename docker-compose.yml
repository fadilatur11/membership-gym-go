services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: air -c .air.toml

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gym_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_gym_app
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=2GLCOhWZ9GKDWbuGJ1PHk9xrj6E_jnDz5AefYvG9fE5dy1yU
    command: ["http", "app:8081", "--log=stdout"]
    depends_on:
      - app

volumes:
  postgres_data:
